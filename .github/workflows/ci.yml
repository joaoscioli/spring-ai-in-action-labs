name: Spring AI CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run board game buddy tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: board-game-buddy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test
